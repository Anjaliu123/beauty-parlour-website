<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Title</title>
</head>

<body>
    <form action="/success" method="POST">
        {% csrf_token %}
        <input type="hidden" name="c_name" value="{{ c_name }}" />
        <input type="hidden" name="b_name" value="{{ b_name }}" />
        <input type="hidden" name="amount" value="{{ amount }}" />

        <script src="https://checkout.razorpay.com/v1/checkout.js" data-key="rzp_test_nwC76q90gEjv8k" data-amount="{{amount}}" data-currency="INR" data-order_id="{{payment.id}}" data-buttontext="Pay with Razorpay" data-name="django payment" data-description="this is test payment"
            data-image="https://example.com/your_logo.jpg" data-prefill.name="Gaurav Kumar" data-prefill.email="django@test.com" data-theme.color="#F37254"></script>
        <input type="hidden" custom="Hidden Element" name="hidden" />
    </form>
</body>

</html>
